<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="85"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#ffffff"/>
  <circle cx="1060" cy="110" r="270" fill="#6366f1" opacity="0.13" filter="url(#blur)"/>
  <circle cx="120" cy="560" r="230" fill="#06b6d4" opacity="0.12" filter="url(#blur)"/>

  <!-- brand -->
  <rect x="80" y="74" width="60" height="60" rx="14" fill="#09090b"/>
  <text x="110" y="116" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="26" font-weight="800" fill="#ffffff" letter-spacing="-1">PX</text>
  <text x="158" y="115" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="29" font-weight="700" fill="#09090b" letter-spacing="-0.5">Promethix LLC</text>

  <!-- eyebrow -->
  <text x="82" y="242" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN', sans-serif" font-size="27" font-weight="700" fill="#6366f1" letter-spacing="3">渋谷の受託開発会社</text>

  <!-- heading -->
  <text x="79" y="332" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN', sans-serif" font-size="72" font-weight="800" fill="#09090b" letter-spacing="-2">自社開発で磨いた技術力を、</text>
  <text x="79" y="428" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN', sans-serif" font-size="72" font-weight="800" fill="url(#grad)" letter-spacing="-2">あなたのシステムへ。</text>

  <!-- sub -->
  <text x="82" y="503" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN', sans-serif" font-size="30" font-weight="500" fill="#52525b" letter-spacing="0">Webアプリ・業務システム開発 ／ 運用保守</text>

  <!-- bottom eyebrow -->
  <text x="82" y="576" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#a1a1aa" letter-spacing="3">SOFTWARE DEVELOPMENT — SHIBUYA, TOKYO</text>
</svg>
