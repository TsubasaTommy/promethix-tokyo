name: Deploy to GitHub Pages

on:
  # main への push でビルド→公開
  push:
    branches: [main]
  # 手動実行も可能に
  workflow_dispatch:

# GITHUB_TOKEN に Pages デプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに集約（進行中のデプロイは中断しない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        # pnpm-lock.yaml を検出し install→astro build→dist を Pages アーティファクトとして upload
        uses: withastro/action@v3
        with:
          node-version: 22 # pnpm CLI が要求する Node >=22.13 を満たす
          package-manager: pnpm@latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
